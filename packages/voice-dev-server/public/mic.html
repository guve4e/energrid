<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Energrid Voice Client</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #111;
      color: #eee;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 32px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #f1f1f1;
      color: #111;
    }

    #talkBtn {
      font-weight: bold;
      min-width: 180px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      font-size: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #chat {
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #1d3557;
    }

    .message.assistant {
      background: #2a2a2a;
    }

    .message-role {
      font-size: 12px;
      color: #cfcfcf;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 26px;
      line-height: 1.4;
    }

    .message audio {
      width: 100%;
      margin-top: 10px;
    }

    #log {
      background: #0d0d0d;
      color: #8f8;
      min-height: 200px;
      max-height: 360px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    .tiny {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
    }
  </style>
</head>
<body>
<h1>Energrid Voice Client</h1>

<div class="toolbar">
  <button id="talkBtn">Hold to Talk</button>
  <button id="newConversationBtn">New Conversation</button>
  <button id="clearLogBtn">Clear Log</button>
</div>

<div class="layout">
  <div>
    <div class="panel">
      <div class="label">Conversation</div>
      <div id="chat"></div>
    </div>

    <div class="panel">
      <div class="label">Turn Metrics</div>
      <table id="turnMetricsTable" style="width: 100%; border-collapse: collapse; font-size: 14px;">
        <thead>
        <tr style="color: #aaa; text-align: left; border-bottom: 1px solid #333;">
          <th style="padding: 8px;">#</th>
          <th style="padding: 8px;">STT</th>
          <th style="padding: 8px;">LLM</th>
          <th style="padding: 8px;">TTS</th>
          <th style="padding: 8px;">Total</th>
          <th style="padding: 8px;">Transcript</th>
        </tr>
        </thead>
        <tbody id="turnMetricsBody"></tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="label">Status</div>
      <div id="status" class="value">idle</div>
    </div>

    <div class="panel">
      <div class="label">Conversation ID</div>
      <div id="conversationId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Current Session ID</div>
      <div id="sessionId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Live Partial Transcript</div>
      <div id="partial" class="value"></div>
    </div>

    <div class="panel">
      <div class="label">Buffered Audio Seconds</div>
      <div id="bufferedAudioSeconds" class="value">0.00s</div>
    </div>

    <div class="panel">
      <div class="label">Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>
<script>
  let ws = null
  let audioContext = null
  let mediaStream = null
  let source = null
  let processor = null

  let state = 'idle'
  let isStreaming = false
  let releaseTailTimer = null

  let conversationId = crypto.randomUUID()
  let currentSessionId = ''
  let currentUserMessage = null
  let currentAssistantMessage = null
  let finalReceivedForCurrentTurn = false
  let endOfTurnSentForCurrentTurn = false
  let streamedChunkCount = 0
  let bufferedAudioSeconds = 0
  let turnCounter = 0
  let currentTurnMetrics = null

  const RELEASE_TAIL_MS = 400

  const talkBtn = document.getElementById('talkBtn')
  const newConversationBtn = document.getElementById('newConversationBtn')
  const clearLogBtn = document.getElementById('clearLogBtn')

  const statusEl = document.getElementById('status')
  const conversationIdEl = document.getElementById('conversationId')
  const sessionIdEl = document.getElementById('sessionId')
  const partialEl = document.getElementById('partial')
  const bufferedAudioSecondsEl = document.getElementById('bufferedAudioSeconds')
  const turnMetricsBodyEl = document.getElementById('turnMetricsBody')
  const chatEl = document.getElementById('chat')
  const logEl = document.getElementById('log')

  conversationIdEl.textContent = conversationId

  function log(msg) {
    console.log(msg)
    logEl.textContent += msg + '\n'
    logEl.scrollTop = logEl.scrollHeight
  }

  function setState(next) {
    state = next
    statusEl.textContent = next
  }

  function updateBufferedAudioSeconds(seconds) {
    bufferedAudioSeconds = seconds
    bufferedAudioSecondsEl.textContent = `${seconds.toFixed(2)}s`
  }

  function startTurnMetrics() {
    currentTurnMetrics = {
      startedAt: Date.now(),
      sttFinalAt: null,
      assistantFinalAt: null,
      assistantAudioAt: null,
      transcript: '',
    }
  }

  function resetTurnMetrics() {
    currentTurnMetrics = null
  }

  function addTurnMetricsRow(metrics) {
    const sttMs = metrics.sttFinalAt
      ? metrics.sttFinalAt - metrics.startedAt
      : null
    const llmMs = metrics.assistantFinalAt && metrics.sttFinalAt
      ? metrics.assistantFinalAt - metrics.sttFinalAt
      : null
    const ttsMs = metrics.assistantAudioAt && metrics.assistantFinalAt
      ? metrics.assistantAudioAt - metrics.assistantFinalAt
      : null
    const totalMs = metrics.assistantAudioAt
      ? metrics.assistantAudioAt - metrics.startedAt
      : null

    turnCounter += 1

    const row = document.createElement('tr')
    row.style.borderBottom = '1px solid #222'

    const values = [
      String(turnCounter),
      sttMs !== null ? `${sttMs}ms` : '-',
      llmMs !== null ? `${llmMs}ms` : '-',
      ttsMs !== null ? `${ttsMs}ms` : '-',
      totalMs !== null ? `${totalMs}ms` : '-',
      metrics.transcript || '-',
    ]

    values.forEach((value) => {
      const td = document.createElement('td')
      td.style.padding = '8px'
      td.textContent = value
      row.appendChild(td)
    })

    turnMetricsBodyEl.prepend(row)
  }

  function float32ToInt16(float32Array) {
    const int16Array = new Int16Array(float32Array.length)
    for (let i = 0; i < float32Array.length; i++) {
      const s = Math.max(-1, Math.min(1, float32Array[i]))
      int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7fff
    }
    return int16Array
  }

  function createMessage(role, text = '') {
    const wrapper = document.createElement('div')
    wrapper.className = `message ${role}`

    const roleEl = document.createElement('div')
    roleEl.className = 'message-role'
    roleEl.textContent = role === 'user' ? 'User' : 'Assistant'

    const textEl = document.createElement('div')
    textEl.className = 'message-text'
    textEl.textContent = text

    wrapper.appendChild(roleEl)
    wrapper.appendChild(textEl)
    chatEl.appendChild(wrapper)

    return { wrapper, textEl }
  }

  function addAssistantAudio(messageRef, base64Audio) {
    if (!messageRef || !base64Audio) return

    const audio = document.createElement('audio')
    audio.controls = true
    audio.autoplay = true
    audio.src = `data:audio/wav;base64,${base64Audio}`
    messageRef.wrapper.appendChild(audio)
  }

  function cancelReleaseTail() {
    if (releaseTailTimer) {
      clearTimeout(releaseTailTimer)
      releaseTailTimer = null
    }
  }

  function resetTransportOnly() {
    isStreaming = false

    if (processor) {
      processor.disconnect()
      processor = null
    }

    if (source) {
      source.disconnect()
      source = null
    }

    if (mediaStream) {
      mediaStream.getTracks().forEach((t) => t.stop())
      mediaStream = null
    }

    if (audioContext) {
      audioContext.close()
      audioContext = null
    }
  }

  function closeSocketIfOpen() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close()
    }
    ws = null
  }

  function startNewConversation() {
    cancelReleaseTail()
    resetTransportOnly()
    closeSocketIfOpen()

    conversationId = crypto.randomUUID()
    currentSessionId = ''
    currentUserMessage = null
    currentAssistantMessage = null
    finalReceivedForCurrentTurn = false
    endOfTurnSentForCurrentTurn = false
    streamedChunkCount = 0
    updateBufferedAudioSeconds(0)
    turnCounter = 0
    resetTurnMetrics()

    chatEl.innerHTML = ''
    turnMetricsBodyEl.innerHTML = ''
    partialEl.textContent = ''
    conversationIdEl.textContent = conversationId
    sessionIdEl.textContent = ''
    setState('idle')

    log('new conversation created')
  }

  async function startTurn() {
    if (state !== 'idle') return

    cancelReleaseTail()
    partialEl.textContent = ''
    currentSessionId = ''
    currentUserMessage = null
    currentAssistantMessage = null
    finalReceivedForCurrentTurn = false
    endOfTurnSentForCurrentTurn = false
    streamedChunkCount = 0
    updateBufferedAudioSeconds(0)
    startTurnMetrics()

    setState('connecting')
    log('starting turn...')

    ws = new WebSocket('ws://localhost:3000/voice')

    ws.onopen = async () => {
      log('[voice] connected')

      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        },
      })
      log('mic granted')

      audioContext = new (window.AudioContext || window.webkitAudioContext)({
        sampleRate: 16000,
      })

      source = audioContext.createMediaStreamSource(mediaStream)
      processor = audioContext.createScriptProcessor(4096, 1, 1)

      processor.onaudioprocess = (event) => {
        if (!isStreaming) return
        if (!ws || ws.readyState !== WebSocket.OPEN) return

        const input = event.inputBuffer.getChannelData(0)
        const pcm16 = float32ToInt16(input)
        ws.send(pcm16.buffer)

        streamedChunkCount += 1
        const chunkSeconds = pcm16.length / 16000
        updateBufferedAudioSeconds(streamedChunkCount * chunkSeconds)
      }

      source.connect(processor)
      processor.connect(audioContext.destination)

      isStreaming = true
      setState('recording')
      log('streaming pcm16 @ 16k...')
    }

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data)
      log(`[voice] recv: ${data.type}`)

      if (data.type === 'session_start') {
        currentSessionId = data.sessionId || ''
        sessionIdEl.textContent = currentSessionId

        if (data.conversationId) {
          conversationId = data.conversationId
          conversationIdEl.textContent = conversationId
        }
        return
      }

      if (data.type === 'stt_partial') {
        partialEl.textContent = data.full || data.text || ''
        return
      }

      if (data.type === 'stt_final') {
        finalReceivedForCurrentTurn = true
        if (currentTurnMetrics) {
          currentTurnMetrics.sttFinalAt = Date.now()
          currentTurnMetrics.transcript = data.full || data.text || ''
        }
        partialEl.textContent = ''
        currentUserMessage = createMessage('user', data.full || data.text || '')
        return
      }

      if (data.type === 'assistant_final') {
        if (currentTurnMetrics) {
          currentTurnMetrics.assistantFinalAt = Date.now()
        }
        currentAssistantMessage = createMessage('assistant', data.text || '')
        setState('reply_ready')
        return
      }

      if (data.type === 'assistant_audio') {
        if (currentTurnMetrics) {
          currentTurnMetrics.assistantAudioAt = Date.now()
          addTurnMetricsRow(currentTurnMetrics)
          resetTurnMetrics()
        }
        addAssistantAudio(currentAssistantMessage, data.audioBase64 || '')
        return
      }

      if (data.type === 'turn_end') {
        log('[voice] turn complete')
        setState('idle')
        streamedChunkCount = 0
        updateBufferedAudioSeconds(0)
        resetTransportOnly()
        closeSocketIfOpen()
        return
      }

      if (data.type === 'error') {
        const msg = data.message || 'unknown'
        const ignorableBufferError =
          msg.includes('buffer too small') && finalReceivedForCurrentTurn

        if (ignorableBufferError) {
          log(`[voice] ignored benign error: ${msg}`)
          return
        }

        log(`[voice] server error: ${msg}`)
        setState('error')
        resetTransportOnly()
        closeSocketIfOpen()
      }
    }

    ws.onclose = () => {
      log('[voice] closed')
      streamedChunkCount = 0
      updateBufferedAudioSeconds(0)
      resetTransportOnly()

      if (state !== 'error' && state !== 'idle') {
        setState('idle')
      }
    }

    ws.onerror = (e) => {
      log('[voice] error')
      console.error(e)
      setState('error')
    }
  }

  function finishInputAfterRelease() {
    if (endOfTurnSentForCurrentTurn) return

    resetTransportOnly()
    setState('waiting_reply')
    log('[voice] input stopped after release')
    log(`[voice] buffered audio seconds: ${bufferedAudioSeconds.toFixed(2)}s`)

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      log('[voice] cannot send end_of_turn because socket is not open')
      return
    }

    endOfTurnSentForCurrentTurn = true
    ws.send(JSON.stringify({
      type: 'end_of_turn',
      conversationId,
    }))

    log('[voice] end_of_turn sent')
  }

  function scheduleEndOfTurn() {
    if (state !== 'recording') return

    setState('waiting_final')
    log(`release detected, tail=${RELEASE_TAIL_MS}ms`)
    log('[voice] mouse/touch released')

    cancelReleaseTail()
    releaseTailTimer = setTimeout(() => {
      finishInputAfterRelease()
    }, RELEASE_TAIL_MS)
  }

  talkBtn.addEventListener('mousedown', startTurn)
  talkBtn.addEventListener('mouseup', scheduleEndOfTurn)
  talkBtn.addEventListener('mouseleave', () => {
    if (state === 'recording') {
      scheduleEndOfTurn()
    }
  })

  talkBtn.addEventListener('touchstart', (e) => {
    e.preventDefault()
    startTurn()
  }, { passive: false })

  talkBtn.addEventListener('touchend', (e) => {
    e.preventDefault()
    scheduleEndOfTurn()
  }, { passive: false })

  newConversationBtn.addEventListener('click', startNewConversation)

  clearLogBtn.addEventListener('click', () => {
    logEl.textContent = ''
  })
</script>
</body>
</html>
