<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Energrid Voice Debug</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      background: #111;
      color: #eee;
      max-width: 900px;
      margin: 0 auto;
    }
    h2 { margin-top: 0; }
    button {
      padding: 10px 16px;
      margin-right: 10px;
      cursor: pointer;
    }
    #talkBtn {
      font-size: 16px;
      font-weight: bold;
      min-width: 180px;
    }
    .panel {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 16px;
      margin-top: 16px;
    }
    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .value {
      font-size: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #log {
      background: #0d0d0d;
      color: #8f8;
      min-height: 150px;
      max-height: 260px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
    }
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user { background: #1d3557; }
    .message.assistant { background: #2a2a2a; }
  </style>
</head>
<body>
  <h2>Energrid Voice Debug</h2>

  <button id="talkBtn">Hold to Talk</button>
  <button onclick="clearConversation()">Clear Conversation</button>

  <div class="panel">
    <div class="label">Status</div>
    <div id="status" class="value">idle</div>
  </div>

  <div class="panel">
    <div class="label">Conversation ID</div>
    <div id="conversationId" class="value"></div>
  </div>

  <div class="panel">
    <div class="label">Live partial transcript</div>
    <div id="partial" class="value"></div>
  </div>

  <div class="panel">
    <div class="label">Chat</div>
    <div id="chat"></div>
  </div>

  <div class="panel">
    <div class="label">Log</div>
    <pre id="log"></pre>
  </div>

  <script>
    let ws = null
    let debugWs = null
    let audioContext = null
    let mediaStream = null
    let source = null
    let processor = null

    let state = 'idle'
    let isStreaming = false
    let currentTurnFinished = false
    let currentTurnUserText = ''
    let stopTimer = null
    let conversationId = crypto.randomUUID()

    const RELEASE_TAIL_MS = 900

    const statusEl = document.getElementById('status')
    const partialEl = document.getElementById('partial')
    const chatEl = document.getElementById('chat')
    const logEl = document.getElementById('log')
    const conversationIdEl = document.getElementById('conversationId')
    const talkBtn = document.getElementById('talkBtn')

    conversationIdEl.textContent = conversationId

    function log(msg) {
      console.log(msg)
      logEl.textContent += msg + '\\n'
      logEl.scrollTop = logEl.scrollHeight
    }

    function setState(next) {
      state = next
      statusEl.textContent = next
    }

    function appendMessage(role, text) {
      const div = document.createElement('div')
      div.className = `message ${role}`
      div.textContent = `${role === 'user' ? 'You' : 'Assistant'}: ${text}`
      chatEl.appendChild(div)
    }

    function clearConversation() {
      chatEl.innerHTML = ''
      partialEl.textContent = ''
      logEl.textContent = ''
      currentTurnUserText = ''
      conversationId = crypto.randomUUID()
      conversationIdEl.textContent = conversationId
      cancelScheduledStop()
      hardStopStreaming()
      setState('idle')
      log('new conversation created')
    }

    function float32ToInt16(float32Array) {
      const int16Array = new Int16Array(float32Array.length)
      for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]))
        int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7fff
      }
      return int16Array
    }

    function ensureDebugSocket() {
      if (debugWs && (debugWs.readyState === WebSocket.OPEN || debugWs.readyState === WebSocket.CONNECTING)) {
        return
      }

      debugWs = new WebSocket('ws://localhost:3000/voice-debug')
      debugWs.onopen = () => log('[debug] connected')
      debugWs.onclose = () => log('[debug] closed')
      debugWs.onerror = (e) => {
        log('[debug] error')
        console.error(e)
      }

      debugWs.onmessage = (event) => {
        const data = JSON.parse(event.data)

        if (data.type === 'stt_partial') {
          partialEl.textContent = data.full || data.text || ''
          return
        }

        if (data.type === 'stt_final') {
          currentTurnUserText = data.full || data.text || ''
          partialEl.textContent = ''
          appendMessage('user', currentTurnUserText)
          currentTurnFinished = true
          cancelScheduledStop()
          hardStopStreaming()
          setState('waiting_reply')
          log('[debug] final transcript received')
          return
        }

        if (data.type === 'assistant_final') {
          appendMessage('assistant', data.text || '')
          setState('done')
          log('[debug] assistant reply received')
          return
        }

        if (data.type === 'stt_error') {
          setState('error')
          log('[debug] stt error: ' + (data.message || 'unknown'))
          cancelScheduledStop()
          hardStopStreaming()
          return
        }

        if (data.type === 'session_start') {
          log('[debug] session started')
          return
        }

        if (data.type === 'session_end') {
          log('[debug] session ended')
          return
        }
      }
    }

    function cancelScheduledStop() {
      if (stopTimer) {
        clearTimeout(stopTimer)
        stopTimer = null
      }
    }

    async function startTurn() {
      if (state === 'recording' || state === 'waiting_final' || state === 'waiting_reply') {
        return
      }

      cancelScheduledStop()
      ensureDebugSocket()

      currentTurnFinished = false
      currentTurnUserText = ''
      partialEl.textContent = ''

      log('starting turn...')
      setState('connecting')

      ws = new WebSocket('ws://localhost:3000/voice')

      ws.onopen = async () => {
        log('[voice] connected')
        ws.send(JSON.stringify({
          type: 'conversation_init',
          conversationId,
        }))

        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        log('mic granted')

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 16000,
        })

        source = audioContext.createMediaStreamSource(mediaStream)
        processor = audioContext.createScriptProcessor(4096, 1, 1)

        processor.onaudioprocess = (event) => {
          if (!ws || ws.readyState !== WebSocket.OPEN) return
          if (!isStreaming) return

          const input = event.inputBuffer.getChannelData(0)
          const pcm16 = float32ToInt16(input)
          ws.send(pcm16.buffer)
        }

        source.connect(processor)
        processor.connect(audioContext.destination)

        isStreaming = true
        setState('recording')
        log('streaming pcm16 @ 16k...')
      }

      ws.onclose = () => {
        log('[voice] closed')
      }

      ws.onerror = (e) => {
        log('[voice] error')
        console.error(e)
        setState('error')
      }
    }

    function scheduleStopAfterRelease() {
      if (state !== 'recording') return

      setState('waiting_final')
      log(`release detected, tail=${RELEASE_TAIL_MS}ms`)

      cancelScheduledStop()
      stopTimer = setTimeout(() => {
        log('release tail elapsed')
        hardStopStreaming()
        if (!currentTurnFinished) {
          setState('waiting_reply')
        }
      }, RELEASE_TAIL_MS)
    }

    function hardStopStreaming() {
      if (!isStreaming && !processor && !source && !mediaStream && !audioContext && !ws) {
        return
      }

      isStreaming = false

      if (processor) {
        processor.disconnect()
        processor = null
      }

      if (source) {
        source.disconnect()
        source = null
      }

      if (mediaStream) {
        mediaStream.getTracks().forEach((t) => t.stop())
        mediaStream = null
      }

      if (audioContext) {
        audioContext.close()
        audioContext = null
      }

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close()
      }

      ws = null
    }

    talkBtn.addEventListener('mousedown', startTurn)
    talkBtn.addEventListener('mouseup', scheduleStopAfterRelease)
    talkBtn.addEventListener('mouseleave', () => {
      if (state === 'recording') {
        scheduleStopAfterRelease()
      }
    })

    talkBtn.addEventListener('touchstart', (e) => {
      e.preventDefault()
      startTurn()
    }, { passive: false })

    talkBtn.addEventListener('touchend', (e) => {
      e.preventDefault()
      scheduleStopAfterRelease()
    }, { passive: false })
  </script>
</body>
</html>
