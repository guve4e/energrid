<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Energrid Voice Client Auto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #111;
      color: #eee;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 32px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #f1f1f1;
      color: #111;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      font-size: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tiny {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #chat {
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #1d3557;
    }

    .message.assistant {
      background: #2a2a2a;
    }

    .message-role {
      font-size: 12px;
      color: #cfcfcf;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 24px;
      line-height: 1.4;
    }

    .message audio {
      width: 100%;
      margin-top: 10px;
    }

    #log {
      background: #0d0d0d;
      color: #8f8;
      min-height: 160px;
      max-height: 300px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #metricsTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    #metricsTable th,
    #metricsTable td {
      border-bottom: 1px solid #333;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }

    #metricsTable th {
      color: #bbb;
      font-weight: bold;
    }

    .good {
      color: #8f8;
    }

    .warn {
      color: #ffcc66;
    }

    .bad {
      color: #ff8888;
    }
  </style>
</head>
<body>
<h1>Energrid Voice Client Auto</h1>

<div class="toolbar">
  <button id="startBtn">Start Session</button>
  <button id="stopBtn">Stop Session</button>
  <button id="newConversationBtn">New Conversation</button>
  <button id="clearLogBtn">Clear Log</button>
</div>

<div class="layout">
  <div>
    <div class="panel">
      <div class="label">Conversation</div>
      <div id="chat"></div>
    </div>

    <div class="panel">
      <div class="label">Turn Metrics</div>
      <table id="metricsTable">
        <thead>
        <tr>
          <th>#</th>
          <th>STT</th>
          <th>LLM</th>
          <th>TTS</th>
          <th>Total</th>
          <th>Transcript</th>
        </tr>
        </thead>
        <tbody id="metricsBody"></tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="label">Runtime State</div>
      <div id="status" class="value">idle</div>
    </div>

    <div class="panel">
      <div class="label">Conversation ID</div>
      <div id="conversationId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Current Session ID</div>
      <div id="sessionId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Live Partial Transcript</div>
      <div id="partial" class="value"></div>
    </div>

    <div class="panel">
      <div class="label">Mic / VAD</div>
      <div class="tiny" id="vadInfo"></div>
    </div>

    <div class="panel">
      <div class="label">Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script>
  const CONFIG = {
    WS_URL: 'ws://localhost:3000/voice',
    START_THRESHOLD: 0.045,
    STOP_THRESHOLD: 0.018,
    MIN_SPEECH_MS: 700,
    SILENCE_MS_TO_STOP: 1700,
    MIN_AUDIO_BEFORE_SEND_MS: 1000,
    MIN_CHUNKS_BEFORE_FINISH: 16,
    ASSISTANT_PLAYBACK_GRACE_MS: 1200,
  }

  const els = {
    chat: document.getElementById('chat'),
    status: document.getElementById('status'),
    conversationId: document.getElementById('conversationId'),
    sessionId: document.getElementById('sessionId'),
    partial: document.getElementById('partial'),
    log: document.getElementById('log'),
    vadInfo: document.getElementById('vadInfo'),
    metricsBody: document.getElementById('metricsBody'),
    startBtn: document.getElementById('startBtn'),
    stopBtn: document.getElementById('stopBtn'),
    newConversationBtn: document.getElementById('newConversationBtn'),
    clearLogBtn: document.getElementById('clearLogBtn'),
  }

  const app = {
    conversationId: crypto.randomUUID(),
    currentSessionId: '',
    state: 'idle',
    listeningArmed: false,
    utteranceActive: false,
    ws: null,
    audioContext: null,
    mediaStream: null,
    source: null,
    processor: null,
    currentUserMessage: null,
    currentAssistantMessage: null,
    turnCounter: 0,
    speechStartedAt: 0,
    silenceStartedAt: 0,
    utteranceStartedAt: 0,
    accumulatedAudioMs: 0,
    streamedChunkCount: 0,
    isStreamingToSocket: false,
    finalReceivedForCurrentTurn: false,
    endOfTurnSentForCurrentTurn: false,
    assistantAudioPlaying: false,
    suppressAutoListenUntil: 0,
    init() {
      els.conversationId.textContent = this.conversationId
      els.startBtn.addEventListener('click', () => this.startSession())
      els.stopBtn.addEventListener('click', () => this.stopSession())
      els.newConversationBtn.addEventListener('click', () => this.startNewConversation())
      els.clearLogBtn.addEventListener('click', () => {
        els.log.textContent = ''
      })
      this.setState('idle')
    },

    nowMs() {
      return Date.now()
    },

    log(msg) {
      console.log(msg)
      els.log.textContent += msg + '\n'
      els.log.scrollTop = els.log.scrollHeight
    },

    setState(next) {
      this.state = next
      els.status.textContent = next
    },

    float32ToInt16(float32Array) {
      const int16Array = new Int16Array(float32Array.length)
      for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]))
        int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7fff
      }
      return int16Array
    },

    calcRms(float32Array) {
      let sum = 0
      for (let i = 0; i < float32Array.length; i++) {
        const v = float32Array[i]
        sum += v * v
      }
      return Math.sqrt(sum / float32Array.length)
    },

    isMeaningfulTranscript(text) {
      const t = (text || '').trim()

      if (!t) return false
      if (t.length < 2) return false

      const fillers = new Set([
        'м',
        'мм',
        'мм.',
        'а',
        'а.',
        'ъ',
        'ъъ',
        'eh',
        'um',
        'uh',
      ])

      if (fillers.has(t.toLowerCase())) return false

      return /[A-Za-zА-Яа-я]/.test(t)
    },

    createMessage(role, text = '') {
      const wrapper = document.createElement('div')
      wrapper.className = `message ${role}`

      const roleEl = document.createElement('div')
      roleEl.className = 'message-role'
      roleEl.textContent = role === 'user' ? 'User' : 'Assistant'

      const textEl = document.createElement('div')
      textEl.className = 'message-text'
      textEl.textContent = text

      wrapper.appendChild(roleEl)
      wrapper.appendChild(textEl)
      els.chat.appendChild(wrapper)

      return { wrapper, textEl }
    },

      addAssistantAudio(messageRef, base64Audio) {
        if (!messageRef || !base64Audio) return

        const audio = document.createElement('audio')
        audio.controls = true
        audio.autoplay = true
        audio.src = `data:audio/wav;base64,${base64Audio}`

        audio.addEventListener('play', () => {
          this.assistantAudioPlaying = true
          this.suppressAutoListenUntil = Math.max(
            this.suppressAutoListenUntil,
            this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
          )
          this.log('[voice] assistant audio playback started')
        })

        const markPlaybackEnded = () => {
          this.assistantAudioPlaying = false
          this.suppressAutoListenUntil = Math.max(
            this.suppressAutoListenUntil,
            this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
          )
          this.log('[voice] assistant audio playback ended')
        }

        audio.addEventListener('ended', markPlaybackEnded)
        audio.addEventListener('pause', () => {
          if (audio.ended) return
          markPlaybackEnded()
        })

        messageRef.wrapper.appendChild(audio)
      },

    formatMs(ms) {
      if (ms == null) return ''
      return `${Math.round(ms)}ms`
    },

    latencyClass(ms) {
      if (ms == null) return ''
      if (ms < 800) return 'good'
      if (ms < 1800) return 'warn'
      return 'bad'
    },

    pushMetricsRow(turn) {
      const sttMs = turn.sttFinalAt && turn.audioStartAt
        ? turn.sttFinalAt - turn.audioStartAt
        : null

      const llmMs = turn.assistantFinalAt && turn.sttFinalAt
        ? turn.assistantFinalAt - turn.sttFinalAt
        : null

      const ttsMs = turn.assistantAudioAt && turn.assistantFinalAt
        ? turn.assistantAudioAt - turn.assistantFinalAt
        : null

      const totalMs = turn.turnEndAt && turn.audioStartAt
        ? turn.turnEndAt - turn.audioStartAt
        : null

      const row = document.createElement('tr')
      row.innerHTML = `
        <td>${turn.index}</td>
        <td class="${this.latencyClass(sttMs)}">${this.formatMs(sttMs)}</td>
        <td class="${this.latencyClass(llmMs)}">${this.formatMs(llmMs)}</td>
        <td class="${this.latencyClass(ttsMs)}">${this.formatMs(ttsMs)}</td>
        <td class="${this.latencyClass(totalMs)}">${this.formatMs(totalMs)}</td>
        <td>${(turn.transcript || '').slice(0, 80)}</td>
      `
      els.metricsBody.prepend(row)
    },

    resetConversationVisuals() {
      els.chat.innerHTML = ''
      els.partial.textContent = ''
      this.currentUserMessage = null
      this.currentAssistantMessage = null
      els.metricsBody.innerHTML = ''
      this.turnCounter = 0
    },

    startNewConversation() {
      this.conversationId = crypto.randomUUID()
      els.conversationId.textContent = this.conversationId
      this.currentSessionId = ''
      els.sessionId.textContent = ''
      this.resetConversationVisuals()
      this.assistantAudioPlaying = false
      this.suppressAutoListenUntil = 0
      this.log('new conversation created')
    },

    cleanupSocketOnly() {
      this.isStreamingToSocket = false
      this.finalReceivedForCurrentTurn = false
      this.endOfTurnSentForCurrentTurn = false

      this.suppressAutoListenUntil = Math.max(
        this.suppressAutoListenUntil,
        this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
      )

      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.close()
      }
      this.ws = null

      this.utteranceActive = false
      this.currentSessionId = ''
      els.sessionId.textContent = ''
      this.speechStartedAt = 0
      this.silenceStartedAt = 0
      this.utteranceStartedAt = 0
      this.accumulatedAudioMs = 0
      this.streamedChunkCount = 0
      this.currentUserMessage = null
      this.currentAssistantMessage = null
    },

    async openMic() {
      if (this.audioContext) return

      this.mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          channelCount: 1,
          echoCancellation: false,
          noiseSuppression: false,
          autoGainControl: false,
        },
      })
      this.audioContext = new (window.AudioContext || window.webkitAudioContext)()
      this.source = this.audioContext.createMediaStreamSource(this.mediaStream)
      this.processor = this.audioContext.createScriptProcessor(4096, 1, 1)

      this.processor.onaudioprocess = (event) => this.onAudioProcess(event)

      this.source.connect(this.processor)
      this.processor.connect(this.audioContext.destination)

      this.log('mic open and armed')
    },

    closeMic() {
      if (this.processor) {
        this.processor.disconnect()
        this.processor = null
      }

      if (this.source) {
        this.source.disconnect()
        this.source = null
      }

      if (this.mediaStream) {
        this.mediaStream.getTracks().forEach((t) => t.stop())
        this.mediaStream = null
      }

      if (this.audioContext) {
        this.audioContext.close()
        this.audioContext = null
      }

      this.log('mic closed')
    },

    createNewTurn() {
      this.turnCounter += 1
      this.currentTurn = {
        index: this.turnCounter,
        conversationId: this.conversationId,
        sessionId: '',
        audioStartAt: this.nowMs(),
        sttFinalAt: null,
        assistantFinalAt: null,
        assistantAudioAt: null,
        turnEndAt: null,
        transcript: '',
        reply: '',
        isMeaningful: false,
      }
    },

    startUtterance() {
      this.log(`[voice] creating websocket to ${CONFIG.WS_URL}`)

      if (this.utteranceActive) return

      this.utteranceActive = true
      this.isStreamingToSocket = false
      this.finalReceivedForCurrentTurn = false
      this.endOfTurnSentForCurrentTurn = false
      this.utteranceStartedAt = this.nowMs()
      this.accumulatedAudioMs = 0
      this.streamedChunkCount = 0
      this.speechStartedAt = this.nowMs()
      this.silenceStartedAt = 0

      els.partial.textContent = ''
      this.currentUserMessage = null
      this.currentAssistantMessage = null

      this.createNewTurn()

      this.setState('connecting_turn')
      this.log('speech detected -> opening turn socket')

      try {
        this.ws = new WebSocket(CONFIG.WS_URL)
        this.log('[voice] websocket object created')
      } catch (error) {
        this.log(`[voice] websocket constructor failed: ${String(error)}`)
        console.error(error)
        this.cleanupSocketOnly()
        this.setState(this.listeningArmed ? 'armed_listening' : 'error')
        return
      }

      this.ws.onopen = () => {
        this.log('[voice] connected')
        this.isStreamingToSocket = true
        this.setState('streaming_turn')
      }

      this.ws.onmessage = (event) => {
        const data = JSON.parse(event.data)
        this.log(`[voice] recv: ${data.type}`)

        if (data.type === 'session_start') {
          this.currentSessionId = data.sessionId || ''
          els.sessionId.textContent = this.currentSessionId

          if (this.currentTurn) {
            this.currentTurn.sessionId = this.currentSessionId
          }

          if (data.conversationId) {
            this.conversationId = data.conversationId
            els.conversationId.textContent = this.conversationId
            if (this.currentTurn) {
              this.currentTurn.conversationId = this.conversationId
            }
          }
          return
        }

        if (data.type === 'stt_partial') {
          els.partial.textContent = data.full || data.text || ''
          return
        }

        if (data.type === 'stt_final') {
          this.finalReceivedForCurrentTurn = true
          els.partial.textContent = ''

          const transcript = (data.full || data.text || '').trim()
          const meaningful = this.isMeaningfulTranscript(transcript)

          if (this.currentTurn) {
            this.currentTurn.transcript = transcript
            this.currentTurn.sttFinalAt = this.nowMs()
            this.currentTurn.isMeaningful = meaningful
          }

          if (!meaningful) {
            this.log(`[voice] ignoring weak transcript: "${transcript}"`)
            this.cleanupSocketOnly()
            this.setState(this.listeningArmed ? 'armed_listening' : 'idle')
            return
          }

          this.currentUserMessage = this.createMessage('user', transcript)
          this.setState('waiting_assistant')
          return
        }

        if (data.type === 'assistant_final') {
          if (!this.currentTurn?.isMeaningful) {
            this.log('[voice] ignoring assistant reply for non-meaningful turn')
            return
          }

          this.currentAssistantMessage = this.createMessage('assistant', data.text || '')

          if (this.currentTurn) {
            this.currentTurn.reply = data.text || ''
            this.currentTurn.assistantFinalAt = this.nowMs()
          }

          this.setState('assistant_ready')
          return
        }

        if (data.type === 'assistant_audio') {
          if (!this.currentTurn?.isMeaningful) {
            this.log('[voice] ignoring assistant audio for non-meaningful turn')
            return
          }

          this.addAssistantAudio(this.currentAssistantMessage, data.audioBase64 || '')

          if (this.currentTurn) {
            this.currentTurn.assistantAudioAt = this.nowMs()
          }

          this.setState('speaking')
          return
        }

        if (data.type === 'turn_end') {
          this.log('[voice] turn complete')

          if (this.currentTurn) {
            this.currentTurn.turnEndAt = this.nowMs()
            if (this.currentTurn.isMeaningful) {
              this.pushMetricsRow(this.currentTurn)
            }
          }

          this.cleanupSocketOnly()
          this.setState(this.listeningArmed ? 'armed_listening' : 'idle')
          return
        }

        if (data.type === 'error') {
          const msg = data.message || 'unknown'
          const ignorableBufferError =
            msg.includes('buffer too small') && this.finalReceivedForCurrentTurn

          if (ignorableBufferError) {
            this.log(`[voice] ignored benign error: ${msg}`)
            return
          }

          this.log(`[voice] server error: ${msg}`)
          this.cleanupSocketOnly()
          this.setState(this.listeningArmed ? 'armed_listening' : 'error')
        }
      }

      this.ws.onclose = () => {
        this.log('[voice] closed')
        if (this.listeningArmed && this.state === 'waiting_reply') {
          this.setState('armed_listening')
        }
      }

      this.ws.onerror = (e) => {
        this.log('[voice] error')
        console.error(e)
        this.cleanupSocketOnly()
        this.setState(this.listeningArmed ? 'armed_listening' : 'error')
      }

      this.ws.addEventListener('open', () => this.log('[voice] open event listener fired'))
      this.ws.addEventListener('close', (event) =>
        this.log(`[voice] close event listener fired code=${event.code} reason=${event.reason || ''}`),
      )
      this.ws.addEventListener('error', () => this.log('[voice] error event listener fired'))
    },

    finishUtterance() {
      if (!this.utteranceActive) return
      if (this.endOfTurnSentForCurrentTurn) return

      this.utteranceActive = false
      this.isStreamingToSocket = false
      this.silenceStartedAt = 0

      this.setState('waiting_reply')
      this.log('silence detected -> sending end_of_turn')
      this.log(`[voice] utterance stats audioMs=${Math.round(this.accumulatedAudioMs)} chunks=${this.streamedChunkCount}`)

      if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
        this.endOfTurnSentForCurrentTurn = true
        this.log('cannot send end_of_turn, socket not open')
        return
      }

      if (this.finalReceivedForCurrentTurn) {
        this.endOfTurnSentForCurrentTurn = true
        this.log('skipping end_of_turn because stt_final already arrived')
        return
      }

      this.endOfTurnSentForCurrentTurn = true
      this.ws.send(JSON.stringify({ type: 'end_of_turn', conversationId: this.conversationId }))
    },

    updateVadInfo(rms) {
      const suppressRemainingMs = Math.max(0, this.suppressAutoListenUntil - this.nowMs())

      els.vadInfo.textContent =
        `rms=${rms.toFixed(4)}\n` +
        `utteranceActive=${this.utteranceActive}\n` +
        `isStreamingToSocket=${this.isStreamingToSocket}\n` +
        `assistantAudioPlaying=${this.assistantAudioPlaying}\n` +
        `suppressRemainingMs=${Math.round(suppressRemainingMs)}\n` +
        `accumulatedAudioMs=${Math.round(this.accumulatedAudioMs)}\n` +
        `streamedChunkCount=${this.streamedChunkCount}\n` +
        `finalReceived=${this.finalReceivedForCurrentTurn}\n` +
        `endOfTurnSent=${this.endOfTurnSentForCurrentTurn}\n` +
        `conversationId=${this.conversationId}`
    },

    shouldStartUtterance(rms) {
      const now = this.nowMs()

      return (
        this.listeningArmed &&
        !this.ws &&
        !this.utteranceActive &&
        !this.assistantAudioPlaying &&
        now >= this.suppressAutoListenUntil &&
        this.state !== 'waiting_reply' &&
        this.state !== 'assistant_ready' &&
        this.state !== 'speaking' &&
        rms >= CONFIG.START_THRESHOLD
      )
    },

    shouldFinishUtterance(now) {
      const speechDurationMs = this.speechStartedAt ? now - this.speechStartedAt : 0
      const silenceDurationMs = this.silenceStartedAt ? now - this.silenceStartedAt : 0

      return (
        speechDurationMs >= CONFIG.MIN_SPEECH_MS &&
        this.accumulatedAudioMs >= CONFIG.MIN_AUDIO_BEFORE_SEND_MS &&
        this.streamedChunkCount >= CONFIG.MIN_CHUNKS_BEFORE_FINISH &&
        silenceDurationMs >= CONFIG.SILENCE_MS_TO_STOP
      )
    },

    onAudioProcess(event) {
      if (!this.listeningArmed) return

      const input = event.inputBuffer.getChannelData(0)
      const rms = this.calcRms(input)
      const now = this.nowMs()

      this.updateVadInfo(rms)

      if (!this.utteranceActive) {
        if (this.shouldStartUtterance(rms)) {
          this.startUtterance()
        }
        return
      }

      const bufferDurationMs =
        (input.length / event.inputBuffer.sampleRate) * 1000

      if (this.isStreamingToSocket && this.ws && this.ws.readyState === WebSocket.OPEN) {
        const pcm16 = this.float32ToInt16(input)
        this.ws.send(pcm16.buffer)
        this.accumulatedAudioMs += bufferDurationMs
        this.streamedChunkCount += 1
      }

      if (rms >= CONFIG.STOP_THRESHOLD) {
        if (!this.speechStartedAt) {
          this.speechStartedAt = now
        }
        this.silenceStartedAt = 0
        return
      }

      if (!this.silenceStartedAt) {
        this.silenceStartedAt = now
      }

      if (this.shouldFinishUtterance(now)) {
        this.finishUtterance()
      }
    },

    async startSession() {
      if (this.listeningArmed) return

      try {
        await this.openMic()
        this.listeningArmed = true
        this.setState('armed_listening')
        this.log('session armed')
      } catch (error) {
        console.error(error)
        this.log(`start session failed: ${String(error)}`)
        this.setState('error')
      }
    },

    stopSession() {
      this.listeningArmed = false
      this.cleanupSocketOnly()
      this.closeMic()
      this.setState('idle')
      this.log('session stopped')
      this.assistantAudioPlaying = false
      this.suppressAutoListenUntil = 0
    },
  }

  app.init()
</script>
</body>
</html>
