<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Energrid Voice Client Auto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #111;
      color: #eee;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 32px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #f1f1f1;
      color: #111;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      font-size: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tiny {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #chat {
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #1d3557;
    }

    .message.assistant {
      background: #2a2a2a;
    }

    .message-role {
      font-size: 12px;
      color: #cfcfcf;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 24px;
      line-height: 1.4;
    }

    .message audio {
      width: 100%;
      margin-top: 10px;
    }

    #log {
      background: #0d0d0d;
      color: #8f8;
      min-height: 160px;
      max-height: 300px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #metricsTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    #metricsTable th,
    #metricsTable td {
      border-bottom: 1px solid #333;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }

    #metricsTable th {
      color: #bbb;
      font-weight: bold;
    }

    .good {
      color: #8f8;
    }

    .warn {
      color: #ffcc66;
    }

    .bad {
      color: #ff8888;
    }
  </style>
</head>
<body>
<h1>Energrid Voice Client Auto</h1>

<div class="toolbar">
  <button id="startBtn">Start Session</button>
  <button id="stopBtn">Stop Session</button>
  <button id="newConversationBtn">New Conversation</button>
  <button id="clearLogBtn">Clear Log</button>
</div>

<div class="layout">
  <div>
    <div class="panel">
      <div class="label">Conversation</div>
      <div id="chat"></div>
    </div>

    <div class="panel">
      <div class="label">Turn Metrics</div>
      <table id="metricsTable">
        <thead>
        <tr>
          <th>#</th>
          <th>STT</th>
          <th>LLM</th>
          <th>TTS</th>
          <th>Total</th>
          <th>Transcript</th>
        </tr>
        </thead>
        <tbody id="metricsBody"></tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="label">Runtime State</div>
      <div id="status" class="value">idle</div>
    </div>

    <div class="panel">
      <div class="label">Conversation ID</div>
      <div id="conversationId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Current Session ID</div>
      <div id="sessionId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Live Partial Transcript</div>
      <div id="partial" class="value"></div>
    </div>

    <div class="panel">
      <div class="label">Mic / VAD</div>
      <div class="tiny" id="vadInfo"></div>
    </div>

    <div class="panel">
      <div class="label">Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
  const CONFIG = {
    WS_URL: 'ws://localhost:3000/voice',
    VAD_ONNX_WASM_BASE_PATH: 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/',
    VAD_BASE_ASSET_PATH: 'https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/',
    PCM_SAMPLE_RATE: 16000,
    PCM_CHUNK_SAMPLES: 4096,
    ASSISTANT_PLAYBACK_GRACE_MS: 1200,
  }

  const els = {
    chat: document.getElementById('chat'),
    status: document.getElementById('status'),
    conversationId: document.getElementById('conversationId'),
    sessionId: document.getElementById('sessionId'),
    partial: document.getElementById('partial'),
    vadInfo: document.getElementById('vadInfo'),
    log: document.getElementById('log'),
    metricsBody: document.getElementById('metricsBody'),
    startBtn: document.getElementById('startBtn'),
    stopBtn: document.getElementById('stopBtn'),
    newConversationBtn: document.getElementById('newConversationBtn'),
    clearLogBtn: document.getElementById('clearLogBtn'),
  }

  const app = {
    conversationId: crypto.randomUUID(),
    currentSessionId: '',
    state: 'idle',

    listeningArmed: false,
    ws: null,
    vadInstance: null,

    currentUserMessage: null,
    currentAssistantMessage: null,

    turnCounter: 0,
    currentTurn: null,

    finalReceivedForCurrentTurn: false,
    suppressAutoListenUntil: 0,
    assistantAudioPlaying: false,

    init() {
      els.conversationId.textContent = this.conversationId
      this.setState('idle')

      els.startBtn.addEventListener('click', () => this.startSession())
      els.stopBtn.addEventListener('click', () => this.stopSession())
      els.newConversationBtn.addEventListener('click', () => this.startNewConversation())
      els.clearLogBtn.addEventListener('click', () => {
        els.log.textContent = ''
      })

      this.renderVadInfo({
        listeningArmed: false,
        assistantAudioPlaying: false,
        suppressRemainingMs: 0,
        state: this.state,
      })
    },

    nowMs() {
      return Date.now()
    },

    log(msg) {
      console.log(msg)
      els.log.textContent += msg + '\n'
      els.log.scrollTop = els.log.scrollHeight
    },

    setState(next) {
      this.state = next
      els.status.textContent = next
      this.renderVadInfo({
        listeningArmed: this.listeningArmed,
        assistantAudioPlaying: this.assistantAudioPlaying,
        suppressRemainingMs: Math.max(0, this.suppressAutoListenUntil - this.nowMs()),
        state: this.state,
      })
    },

    renderVadInfo({ listeningArmed, assistantAudioPlaying, suppressRemainingMs, state, lastSpeechBytes, lastSpeechSeconds }) {
      els.vadInfo.textContent =
        `listeningArmed=${Boolean(listeningArmed)}\n` +
        `assistantAudioPlaying=${Boolean(assistantAudioPlaying)}\n` +
        `suppressRemainingMs=${Math.round(suppressRemainingMs || 0)}\n` +
        `state=${state || this.state}\n` +
        `lastSpeechBytes=${lastSpeechBytes ?? '-'}\n` +
        `lastSpeechSeconds=${lastSpeechSeconds != null ? lastSpeechSeconds.toFixed(2) : '-'}`
    },

    isAutoListenSuppressed() {
      return this.assistantAudioPlaying || this.nowMs() < this.suppressAutoListenUntil
    },

    createMessage(role, text = '') {
      const wrapper = document.createElement('div')
      wrapper.className = `message ${role}`

      const roleEl = document.createElement('div')
      roleEl.className = 'message-role'
      roleEl.textContent = role === 'user' ? 'User' : 'Assistant'

      const textEl = document.createElement('div')
      textEl.className = 'message-text'
      textEl.textContent = text

      wrapper.appendChild(roleEl)
      wrapper.appendChild(textEl)
      els.chat.appendChild(wrapper)

      return { wrapper, textEl }
    },

    addAssistantAudio(messageRef, base64Audio) {
      if (!messageRef || !base64Audio) return

      const audio = document.createElement('audio')
      audio.controls = true
      audio.autoplay = true
      audio.src = `data:audio/wav;base64,${base64Audio}`

      audio.addEventListener('play', () => {
        this.assistantAudioPlaying = true
        this.suppressAutoListenUntil = Math.max(
          this.suppressAutoListenUntil,
          this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
        )
        this.log('[voice] assistant audio playback started')
        this.renderVadInfo({
          listeningArmed: this.listeningArmed,
          assistantAudioPlaying: this.assistantAudioPlaying,
          suppressRemainingMs: Math.max(0, this.suppressAutoListenUntil - this.nowMs()),
          state: this.state,
        })
      })

      const markPlaybackEnded = () => {
        this.assistantAudioPlaying = false
        this.suppressAutoListenUntil = Math.max(
          this.suppressAutoListenUntil,
          this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
        )
        this.log('[voice] assistant audio playback ended')
        this.renderVadInfo({
          listeningArmed: this.listeningArmed,
          assistantAudioPlaying: this.assistantAudioPlaying,
          suppressRemainingMs: Math.max(0, this.suppressAutoListenUntil - this.nowMs()),
          state: this.state,
        })
      }

      audio.addEventListener('ended', markPlaybackEnded)
      audio.addEventListener('pause', () => {
        if (audio.ended) return
        markPlaybackEnded()
      })

      messageRef.wrapper.appendChild(audio)
    },

    formatMs(ms) {
      if (ms == null) return ''
      return `${Math.round(ms)}ms`
    },

    latencyClass(ms) {
      if (ms == null) return ''
      if (ms < 800) return 'good'
      if (ms < 1800) return 'warn'
      return 'bad'
    },

    pushMetricsRow(turn) {
      const sttMs =
        turn.sttFinalAt && turn.audioStartAt
          ? turn.sttFinalAt - turn.audioStartAt
          : null

      const llmMs =
        turn.assistantFinalAt && turn.sttFinalAt
          ? turn.assistantFinalAt - turn.sttFinalAt
          : null

      const ttsMs =
        turn.assistantAudioAt && turn.assistantFinalAt
          ? turn.assistantAudioAt - turn.assistantFinalAt
          : null

      const totalMs =
        turn.turnEndAt && turn.audioStartAt
          ? turn.turnEndAt - turn.audioStartAt
          : null

      const row = document.createElement('tr')
      row.innerHTML = `
        <td>${turn.index}</td>
        <td class="${this.latencyClass(sttMs)}">${this.formatMs(sttMs)}</td>
        <td class="${this.latencyClass(llmMs)}">${this.formatMs(llmMs)}</td>
        <td class="${this.latencyClass(ttsMs)}">${this.formatMs(ttsMs)}</td>
        <td class="${this.latencyClass(totalMs)}">${this.formatMs(totalMs)}</td>
        <td>${(turn.transcript || '').slice(0, 80)}</td>
      `
      els.metricsBody.prepend(row)
    },

    startNewConversation() {
      this.conversationId = crypto.randomUUID()
      this.currentSessionId = ''
      this.currentUserMessage = null
      this.currentAssistantMessage = null
      this.turnCounter = 0
      this.currentTurn = null
      this.finalReceivedForCurrentTurn = false
      this.suppressAutoListenUntil = 0
      this.assistantAudioPlaying = false

      els.conversationId.textContent = this.conversationId
      els.sessionId.textContent = ''
      els.chat.innerHTML = ''
      els.partial.textContent = ''
      els.metricsBody.innerHTML = ''

      this.log('new conversation created')
      this.setState(this.listeningArmed ? 'armed_listening' : 'idle')
    },

    createNewTurn() {
      this.turnCounter += 1
      this.currentTurn = {
        index: this.turnCounter,
        conversationId: this.conversationId,
        sessionId: '',
        audioStartAt: this.nowMs(),
        sttFinalAt: null,
        assistantFinalAt: null,
        assistantAudioAt: null,
        turnEndAt: null,
        transcript: '',
        reply: '',
        speechBytes: 0,
        speechSeconds: 0,
      }
    },

    floatTo16BitPCM(float32Array) {
      const int16Array = new Int16Array(float32Array.length)
      for (let i = 0; i < float32Array.length; i++) {
        let s = Math.max(-1, Math.min(1, float32Array[i]))
        int16Array[i] = s < 0 ? s * 0x8000 : s * 0x7fff
      }
      return int16Array
    },

    sendPcmAsChunks(ws, audioFloat32) {
      const pcm16 = this.floatTo16BitPCM(audioFloat32)
      const bytes = pcm16.byteLength

      for (let start = 0; start < pcm16.length; start += CONFIG.PCM_CHUNK_SAMPLES) {
        const slice = pcm16.subarray(start, Math.min(start + CONFIG.PCM_CHUNK_SAMPLES, pcm16.length))
        ws.send(slice.buffer.slice(slice.byteOffset, slice.byteOffset + slice.byteLength))
      }

      return bytes
    },

    async processSpeechSegment(audioFloat32) {
      if (!this.listeningArmed) {
        this.log('[voice] dropped speech segment because session is not armed')
        return
      }

      if (this.isAutoListenSuppressed()) {
        this.log('[voice] dropped speech segment because auto-listen is suppressed')
        return
      }

      if (this.ws) {
        this.log('[voice] dropped speech segment because previous turn is still active')
        return
      }

      this.finalReceivedForCurrentTurn = false
      this.currentUserMessage = null
      this.currentAssistantMessage = null
      els.partial.textContent = ''

      this.createNewTurn()
      this.setState('connecting_turn')
      this.log('[voice] speech segment received from MicVAD -> opening turn socket')

      const speechSeconds = audioFloat32.length / CONFIG.PCM_SAMPLE_RATE

      this.renderVadInfo({
        listeningArmed: this.listeningArmed,
        assistantAudioPlaying: this.assistantAudioPlaying,
        suppressRemainingMs: Math.max(0, this.suppressAutoListenUntil - this.nowMs()),
        state: this.state,
        lastSpeechBytes: audioFloat32.length * 4,
        lastSpeechSeconds: speechSeconds,
      })

      try {
        this.ws = new WebSocket(CONFIG.WS_URL)
      } catch (error) {
        this.log(`[voice] websocket constructor failed: ${String(error)}`)
        console.error(error)
        this.ws = null
        this.setState(this.listeningArmed ? 'armed_listening' : 'error')
        return
      }

      this.ws.onopen = () => {
        this.log('[voice] connected')
        this.setState('streaming_turn')

        const sentBytes = this.sendPcmAsChunks(this.ws, audioFloat32)

        if (this.currentTurn) {
          this.currentTurn.speechBytes = sentBytes
          this.currentTurn.speechSeconds = speechSeconds
        }

        this.log(`[voice] sent speech segment bytes=${sentBytes} seconds=${speechSeconds.toFixed(2)}`)

        this.ws.send(JSON.stringify({
          type: 'end_of_turn',
          conversationId: this.conversationId,
        }))

        this.setState('waiting_reply')
        this.log('[voice] end_of_turn sent')
      }

      this.ws.onmessage = (event) => {
        const data = JSON.parse(event.data)
        this.log(`[voice] recv: ${data.type}`)

        if (data.type === 'session_start') {
          this.currentSessionId = data.sessionId || ''
          els.sessionId.textContent = this.currentSessionId

          if (this.currentTurn) {
            this.currentTurn.sessionId = this.currentSessionId
          }

          if (data.conversationId) {
            this.conversationId = data.conversationId
            els.conversationId.textContent = this.conversationId
            if (this.currentTurn) {
              this.currentTurn.conversationId = this.conversationId
            }
          }
          return
        }

        if (data.type === 'stt_partial') {
          els.partial.textContent = data.full || data.text || ''
          return
        }

        if (data.type === 'stt_final') {
          this.finalReceivedForCurrentTurn = true
          els.partial.textContent = ''

          const transcript = (data.full || data.text || '').trim()

          if (this.currentTurn) {
            this.currentTurn.transcript = transcript
            this.currentTurn.sttFinalAt = this.nowMs()
          }

          this.currentUserMessage = this.createMessage('user', transcript)
          this.setState('waiting_assistant')
          return
        }

        if (data.type === 'assistant_final') {
          this.currentAssistantMessage = this.createMessage('assistant', data.text || '')

          if (this.currentTurn) {
            this.currentTurn.reply = data.text || ''
            this.currentTurn.assistantFinalAt = this.nowMs()
          }

          this.setState('assistant_ready')
          return
        }

        if (data.type === 'assistant_audio') {
          this.addAssistantAudio(this.currentAssistantMessage, data.audioBase64 || '')

          if (this.currentTurn) {
            this.currentTurn.assistantAudioAt = this.nowMs()
          }

          this.setState('speaking')
          return
        }

        if (data.type === 'turn_end') {
          this.log('[voice] turn complete')

          if (this.currentTurn) {
            this.currentTurn.turnEndAt = this.nowMs()
            this.pushMetricsRow(this.currentTurn)
          }

          this.cleanupTurnSocket()
          this.setState(this.listeningArmed ? 'armed_listening' : 'idle')
          return
        }

        if (data.type === 'error') {
          const msg = data.message || 'unknown'
          const ignorableBufferError =
            msg.includes('buffer too small') && this.finalReceivedForCurrentTurn

          if (ignorableBufferError) {
            this.log(`[voice] ignored benign error: ${msg}`)
            return
          }

          this.log(`[voice] server error: ${msg}`)
          this.cleanupTurnSocket()
          this.setState(this.listeningArmed ? 'armed_listening' : 'error')
        }
      }

      this.ws.onclose = () => {
        this.log('[voice] closed')
      }

      this.ws.onerror = (e) => {
        this.log('[voice] error')
        console.error(e)
      }
    },

    cleanupTurnSocket() {
      if (this.ws && this.ws.readyState === WebSocket.OPEN) {
        this.ws.close()
      }
      this.ws = null
      this.currentSessionId = ''
      els.sessionId.textContent = ''

      this.suppressAutoListenUntil = Math.max(
        this.suppressAutoListenUntil,
        this.nowMs() + CONFIG.ASSISTANT_PLAYBACK_GRACE_MS,
      )
    },

    async createVad() {
      this.log('[vad] creating MicVAD instance')

      this.vadInstance = await vad.MicVAD.new({
        onnxWASMBasePath: CONFIG.VAD_ONNX_WASM_BASE_PATH,
        baseAssetPath: CONFIG.VAD_BASE_ASSET_PATH,

        onSpeechStart: () => {
          this.log('[vad] speech start detected')
        },

        onSpeechEnd: (audio) => {
          this.log(`[vad] speech end detected samples=${audio.length}`)
          void this.processSpeechSegment(audio)
        },

        onVADMisfire: () => {
          this.log('[vad] misfire detected')
        },
      })

      this.log('[vad] MicVAD ready')
    },

    async startSession() {
      if (this.listeningArmed) return

      try {
        if (!this.vadInstance) {
          await this.createVad()
        }

        await this.vadInstance.start()
        this.listeningArmed = true
        this.setState('armed_listening')
        this.log('session armed')
      } catch (error) {
        console.error(error)
        this.log(`start session failed: ${String(error)}`)
        this.setState('error')
      }
    },

    async stopSession() {
      this.listeningArmed = false
      this.assistantAudioPlaying = false
      this.suppressAutoListenUntil = 0

      if (this.vadInstance) {
        await this.vadInstance.pause()
      }

      this.cleanupTurnSocket()
      this.setState('idle')
      this.log('session stopped')
    },
  }

  app.init()
</script>
</body>
</html>
