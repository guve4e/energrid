<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Energrid Voice Client Auto</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #111;
      color: #eee;
      margin: 0;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 32px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      font-size: 15px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #f1f1f1;
      color: #111;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .value {
      font-size: 18px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .tiny {
      font-size: 13px;
      color: #bbb;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #chat {
      min-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      background: #1d3557;
    }

    .message.assistant {
      background: #2a2a2a;
    }

    .message-role {
      font-size: 12px;
      color: #cfcfcf;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .message-text {
      font-size: 24px;
      line-height: 1.4;
    }

    .message audio {
      width: 100%;
      margin-top: 10px;
    }

    #log {
      background: #0d0d0d;
      color: #8f8;
      min-height: 160px;
      max-height: 300px;
      overflow: auto;
      font-family: monospace;
      font-size: 13px;
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }

    #metricsTable {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    #metricsTable th,
    #metricsTable td {
      border-bottom: 1px solid #333;
      padding: 8px 6px;
      text-align: left;
      vertical-align: top;
    }

    #metricsTable th {
      color: #bbb;
      font-weight: bold;
    }

    .good {
      color: #8f8;
    }

    .warn {
      color: #ffcc66;
    }

    .bad {
      color: #ff8888;
    }
  </style>
</head>
<body>
<h1>Energrid Voice Client Auto</h1>

<div class="toolbar">
  <button id="startBtn">Start Session</button>
  <button id="stopBtn">Stop Session</button>
  <button id="newConversationBtn">New Conversation</button>
  <button id="clearLogBtn">Clear Log</button>
</div>

<div class="layout">
  <div>
    <div class="panel">
      <div class="label">Conversation</div>
      <div id="chat"></div>
    </div>

    <div class="panel">
      <div class="label">Turn Metrics</div>
      <table id="metricsTable">
        <thead>
        <tr>
          <th>#</th>
          <th>STT</th>
          <th>1st Text</th>
          <th>1st Audio</th>
          <th>Complete</th>
          <th>Total</th>
          <th>Transcript</th>
        </tr>
        </thead>
        <tbody id="metricsBody"></tbody>
      </table>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="label">Runtime State</div>
      <div id="status" class="value">idle</div>
    </div>

    <div class="panel">
      <div class="label">Conversation ID</div>
      <div id="conversationId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Current Session ID</div>
      <div id="sessionId" class="tiny"></div>
    </div>

    <div class="panel">
      <div class="label">Live Partial Transcript</div>
      <div id="partial" class="value"></div>
    </div>

    <div class="panel">
      <div class="label">Mic / VAD</div>
      <div class="tiny" id="vadInfo"></div>
    </div>

    <div class="panel">
      <div class="label">Log</div>
      <div id="log"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.wasm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script src="./voice-config.js"></script>
<script src="./voice-state.js"></script>
<script src="./voice-ui.js"></script>
<script src="./voice-audio-player-browser.js"></script>
<script src="./voice-ws-client.js"></script>
<script src="./voice-vad-browser.js"></script>
<script src="./voice-controller.js"></script>
<script>
  const voiceState = window.createVoiceState()
  const voiceUi = window.createVoiceUi()
  const voiceController = window.createVoiceController({
    config: window.VOICE_CONFIG,
    state: voiceState,
    ui: voiceUi,
  })

  voiceController.init()
</script>
</body>
</html>
